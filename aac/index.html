<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="דבר איתי">
<title>דבר איתי</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  body { font-family: -apple-system, Arial, sans-serif; background: #f0f2f5; min-height: 100vh; user-select: none; -webkit-user-select: none; }

  header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 10px 14px; position: sticky; top: 0; z-index: 10; }

  .output-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .output-box {
    flex: 1; min-height: 54px; background: #f0f4ff; border-radius: 14px;
    padding: 8px 12px; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; overflow: hidden;
  }
  .output-placeholder { color: #bbb; font-size: 15px; }
  .tag {
    background: #4a7cf7; color: #fff; border-radius: 20px; padding: 5px 13px;
    font-size: 15px; display: flex; align-items: center; gap: 4px;
    animation: tagIn 0.15s ease;
  }
  @keyframes tagIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .btn-speak {
    background: #4a7cf7; color: #fff; border: none; border-radius: 12px;
    padding: 12px 14px; font-size: 15px; font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .header-bottom { display: flex; align-items: center; gap: 8px; }
  .voice-row { display: flex; align-items: center; gap: 6px; flex: 1; }
  .voice-row label { font-size: 12px; color: #999; white-space: nowrap; }
  .voice-row select { flex: 1; font-size: 12px; border: 1px solid #ddd; border-radius: 8px; padding: 4px 6px; background: #fff; color: #333; }
  .btn-add { background: #4a7cf7; color: #fff; border: none; border-radius: 8px; padding: 5px 12px; font-size: 20px; cursor: pointer; font-weight: 300; line-height: 1; }
  .btn-edit-mode { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 5px 10px; font-size: 13px; cursor: pointer; color: #555; white-space: nowrap; }
  .btn-edit-mode.active { background: #fff3e0; border-color: #ff9800; color: #e65100; }

  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 12px; }
  @media (min-width: 480px) { .grid { grid-template-columns: repeat(3, 1fr); } }

  .card {
    background: #fff; border-radius: 18px; border: 2.5px solid #e8e8e8;
    padding: 18px 10px 12px; text-align: center; cursor: pointer;
    transition: transform 0.08s, border-color 0.15s, background 0.15s;
    position: relative; min-height: 130px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .card:active { transform: scale(0.91); border-color: #4a7cf7; background: #f0f4ff; }
  .card.playing { border-color: #4a7cf7; background: #eef2ff; }
  .card.edit-highlight { border-color: #ff9800; }
  .card-media { width: 64px; height: 64px; object-fit: cover; border-radius: 10px; margin-bottom: 8px; }
  .card .emoji { font-size: 52px; display: block; margin-bottom: 8px; line-height: 1; }
  .card .label { font-size: 16px; font-weight: 600; color: #222; }
  .card .has-audio { position: absolute; top: 6px; right: 6px; font-size: 14px; }
  .edit-btn {
    position: absolute; top: 6px; left: 6px; background: #ff9800; color: #fff;
    border: none; border-radius: 50%; width: 28px; height: 28px;
    font-size: 14px; cursor: pointer; display: none;
    align-items: center; justify-content: center; z-index: 2;
  }
  .edit-mode-on .edit-btn { display: flex; }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 100;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 24px 24px 0 0; padding: 24px 20px 36px;
    width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
  }
  .modal-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px; }
  .modal h2 { font-size: 17px; margin-bottom: 16px; text-align: center; color: #222; }
  .modal-preview { font-size: 56px; text-align: center; display: block; margin-bottom: 8px; }
  .modal-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; }
  .modal label { font-size: 12px; color: #999; display: block; margin-bottom: 4px; margin-top: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
  .modal input[type=text] {
    width: 100%; border: 1.5px solid #e8e8e8; border-radius: 10px;
    padding: 10px 12px; font-size: 16px; background: #f9f9f9; direction: rtl;
  }
  .modal input[type=text]:focus { outline: none; border-color: #4a7cf7; background: #fff; }

  .img-upload-area {
    border: 2px dashed #ddd; border-radius: 12px; padding: 14px;
    text-align: center; cursor: pointer; color: #aaa; font-size: 14px; margin-top: 4px;
  }
  .img-upload-area:active { background: #f5f5f5; }
  .img-preview { width: 70px; height: 70px; object-fit: cover; border-radius: 10px; margin: 0 auto 6px; display: block; }

  .record-area { margin-top: 4px; }
  .record-controls { display: flex; gap: 8px; margin-top: 6px; }
  .btn-record {
    flex: 1; padding: 12px; border-radius: 12px; border: none;
    background: #ff4444; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .btn-record.recording { background: #333; animation: pulse-rec 1s infinite; }
  @keyframes pulse-rec { 0%,100%{opacity:1} 50%{opacity:0.6} }
  .btn-play-rec {
    padding: 12px 16px; border-radius: 12px; border: 1.5px solid #4a7cf7;
    background: #f0f4ff; color: #4a7cf7; font-size: 15px; cursor: pointer;
  }
  .btn-play-rec:disabled { opacity: 0.4; cursor: default; }

  .modal-buttons { display: flex; gap: 8px; margin-top: 20px; }
  .btn-preview-tts {
    flex: 1; padding: 12px; border-radius: 12px; border: 1.5px solid #4a7cf7;
    background: #f0f4ff; color: #4a7cf7; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .btn-save { flex: 1; padding: 12px; border-radius: 12px; border: none; background: #4a7cf7; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn-cancel { padding: 12px 14px; border-radius: 12px; border: 1px solid #e0e0e0; background: #fff; color: #999; font-size: 15px; cursor: pointer; }

  .rec-status { font-size: 13px; color: #888; text-align: center; margin-top: 6px; min-height: 18px; }
</style>
</head>
<body>

<header>
  <div class="output-row">
    <div class="output-box" id="output">
      <span class="output-placeholder">לחץ על כרטיס...</span>
    </div>
    <button class="btn-speak" onclick="speakAll()">דבר</button>
  </div>
  <div class="header-bottom">
    <div class="voice-row">
      <label>קול:</label>
      <select id="voice-select" onchange="saveVoice()"></select>
    </div>
    <button class="btn-add" onclick="addCard()">+</button>
  <button class="btn-edit-mode" id="edit-toggle" onclick="toggleEditMode()">✏️ עריכה</button>
  </div>
</header>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>עריכת כרטיס</h2>
    <div class="modal-preview" id="modal-preview"></div>

    <label>תמונה / אימוג'י</label>
    <div class="img-upload-area" onclick="document.getElementById('img-input').click()">
      <div id="img-upload-text">לחץ להעלאת תמונה מהגלריה</div>
      <input type="file" id="img-input" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
    </div>

    <label>תווית (מה מוצג על הכרטיס)</label>
    <input type="text" id="modal-label" placeholder="למשל: אוכל">

    <label>מה יאמר - טקסט</label>
    <input type="text" id="modal-phrase" placeholder="למשל: Lenny רוצה לאכול">

    <label>או - הקלטה אישית</label>
    <div class="record-area">
      <div class="record-controls">
        <button class="btn-record" id="btn-record" onclick="toggleRecord()">🎙️ הקלט</button>
        <button class="btn-play-rec" id="btn-play-rec" onclick="playRecording()" disabled>▶ נגן</button>
      </div>
      <div class="rec-status" id="rec-status">אין הקלטה</div>
    </div>

    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeModal()">ביטול</button>
      <button class="btn-preview-tts" onclick="previewPhrase()">שמע טקסט ▶</button>
      <button class="btn-save" onclick="saveCard()">שמור</button>
    </div>
  </div>
</div>

<script>
let cardsData = JSON.parse(localStorage.getItem('cardsData') || 'null') || [
  { emoji:"🍎", label:"אוכל",    phrase:"Lenny רוצה לאכול" },
  { emoji:"📱", label:"אייפד",   phrase:"Lenny רוצה אייפד" },
  { emoji:"🍦", label:"ארטיק",   phrase:"Lenny רוצה ארטיק" },
  { emoji:"💧", label:"לשתות",   phrase:"Lenny רוצה לשתות" },
  { emoji:"🚽", label:"קקי",     phrase:"Lenny צריך לעשות קקי" },
  { emoji:"🚿", label:"פיפי",    phrase:"Lenny צריך לעשות פיפי" },
  { emoji:"💃", label:"לרקוד",   phrase:"Lenny רוצה לרקוד" },
  { emoji:"😴", label:"לישון",   phrase:"Lenny רוצה לישון" },
  { emoji:"🪥", label:"שיניים",  phrase:"Lenny רוצה לצחצח שיניים" },
  { emoji:"🙏", label:"תביא לי", phrase:"תביא ללני בבקשה" },
];

const selected = [];
let voices = [];
let savedVoiceName = localStorage.getItem('voiceName') || '';
let editMode = false;
let editingIndex = -1;
let currentAudio = null;
let mediaRecorder = null;
let recordedChunks = [];
let recordedBlob = null;
let isRecording = false;
let autoClearTimer = null;
let tempImageDataUrl = null;

function loadVoices() {
  voices = speechSynthesis.getVoices();
  const sel = document.getElementById('voice-select');
  sel.innerHTML = '';
  const heVoices = voices.filter(v => v.lang.startsWith('he'));
  const otherVoices = voices.filter(v => !v.lang.startsWith('he'));
  [...heVoices, ...otherVoices].forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.name;
    opt.textContent = v.name + ' (' + v.lang + ')';
    if (v.name === savedVoiceName) opt.selected = true;
    sel.appendChild(opt);
  });
  if (!savedVoiceName && heVoices.length > 0) sel.value = heVoices[0].name;
}

function getSelectedVoice() {
  const name = document.getElementById('voice-select').value;
  return voices.find(v => v.name === name) || null;
}

function saveVoice() {
  localStorage.setItem('voiceName', document.getElementById('voice-select').value);
}

function speakTTS(text) {
  return new Promise(resolve => {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const v = getSelectedVoice();
    if (v) u.voice = v;
    u.lang = v ? v.lang : 'he-IL';
    u.rate = 0.85;
    u.onend = resolve; u.onerror = resolve;
    speechSynthesis.speak(u);
  });
}

function stopCurrentAudio() {
  if (currentAudio) { currentAudio.pause(); currentAudio.src = ''; currentAudio = null; }
  if (speechSynthesis.speaking || speechSynthesis.pending) speechSynthesis.cancel();
}

function playCardAudio(i) {
  return new Promise(resolve => {
    if (currentAudio) { currentAudio.pause(); currentAudio.src = ''; currentAudio = null; }
    const c = cardsData[i];
    if (c.audioData) {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioCtx();
        const base64 = c.audioData.split(',')[1];
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let j = 0; j < binary.length; j++) bytes[j] = binary.charCodeAt(j);
        ctx.decodeAudioData(bytes.buffer.slice(0), (audioBuffer) => {
          const source = ctx.createBufferSource();
          const gain = ctx.createGain();
          gain.gain.value = 2.0;
          source.buffer = audioBuffer;
          source.connect(gain);
          gain.connect(ctx.destination);
          source.onended = () => { ctx.close(); resolve(); };
          source.start(0);
        }, () => {
          // fallback to HTML Audio
          const audio = new Audio(c.audioData);
          audio.volume = 1.0;
          currentAudio = audio;
          audio.onended = () => { currentAudio = null; resolve(); };
          audio.onerror = () => { currentAudio = null; resolve(); };
          audio.play().catch(() => { currentAudio = null; resolve(); });
        });
      } catch(e) {
        const audio = new Audio(c.audioData);
        audio.volume = 1.0;
        currentAudio = audio;
        audio.onended = () => { currentAudio = null; resolve(); };
        audio.onerror = () => { currentAudio = null; resolve(); };
        audio.play().catch(() => { currentAudio = null; resolve(); });
      }
    } else {
      speakTTS(c.phrase).then(resolve);
    }
  });
}

function scheduleAutoClear() {
  clearTimeout(autoClearTimer);
  autoClearTimer = setTimeout(() => {
    selected.length = 0;
    renderOutput();
  }, 3000);
}

async function speakAll() {
  clearTimeout(autoClearTimer);
  for (let i = 0; i < selected.length; i++) {
    const ci = selected[i];
    const card = document.getElementById('card-' + ci);
    if (card) card.classList.add('playing');
    await playCardAudio(ci);
    if (card) card.classList.remove('playing');
    if (i < selected.length - 1) await new Promise(r => setTimeout(r, 200));
  }
  scheduleAutoClear();
}

function clearOutput() { clearTimeout(autoClearTimer); selected.length = 0; renderOutput(); }

function renderOutput() {
  const box = document.getElementById('output');
  if (selected.length === 0) {
    box.innerHTML = '<span class="output-placeholder">לחץ על כרטיס...</span>';
    return;
  }
  box.innerHTML = selected.map((ci) =>
    '<div class="tag">' + cardsData[ci].label + '</div>'
  ).join('');
}

function addCard() {
  cardsData.push({ emoji: "⭐", label: "חדש", phrase: "כרטיס חדש" });
  localStorage.setItem('cardsData', JSON.stringify(cardsData));
  renderGrid();
  openEdit(cardsData.length - 1);
}

function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById('edit-toggle');
  btn.classList.toggle('active', editMode);
  btn.textContent = editMode ? '✅ סיום' : '✏️ עריכה';
  document.getElementById('grid').classList.toggle('edit-mode-on', editMode);
}

function openEdit(i) {
  editingIndex = i;
  const c = cardsData[i];
  tempImageDataUrl = c.imageData || null;
  recordedBlob = null;
  recordedChunks = [];
  window._pendingAudioData = null;

  const preview = document.getElementById('modal-preview');
  if (c.imageData) {
    preview.innerHTML = '<img src="' + c.imageData + '" class="img-preview">';
  } else {
    preview.textContent = c.emoji;
  }

  const uploadText = document.getElementById('img-upload-text');
  uploadText.textContent = 'לחץ להעלאת תמונה מהגלריה';

  document.getElementById('modal-label').value = c.label;
  document.getElementById('modal-phrase').value = c.phrase;
  document.getElementById('btn-play-rec').disabled = !c.audioData;
  document.getElementById('rec-status').textContent = c.audioData ? 'יש הקלטה שמורה' : 'אין הקלטה';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingIndex = -1;
  tempImageDataUrl = null;
  stopRecordingIfActive();
}

function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 300;
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
      else { if (h > MAX) { w = w * MAX / h; h = MAX; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      tempImageDataUrl = canvas.toDataURL('image/jpeg', 0.7);
      const preview = document.getElementById('modal-preview');
      preview.innerHTML = '<img src="' + tempImageDataUrl + '" class="img-preview">';
      document.getElementById('img-upload-text').textContent = 'תמונה נטענה - לחץ לשינוי';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function previewPhrase() {
  const phrase = document.getElementById('modal-phrase').value;
  if (phrase) speakTTS(phrase);
}

function getSupportedMimeType() {
  const types = ['audio/mp4', 'audio/aac', 'audio/webm;codecs=opus', 'audio/webm', 'audio/ogg'];
  for (const t of types) {
    if (MediaRecorder.isTypeSupported(t)) return t;
  }
  return '';
}

async function toggleRecord() {
  if (isRecording) {
    stopRecordingIfActive();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recordedChunks = [];
    const mimeType = getSupportedMimeType();
    mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const mime = mediaRecorder.mimeType || mimeType || 'audio/mp4';
      recordedBlob = new Blob(recordedChunks, { type: mime });
      stream.getTracks().forEach(t => t.stop());
      const reader = new FileReader();
      reader.onload = (ev) => {
        window._pendingAudioData = ev.target.result;
        document.getElementById('btn-play-rec').disabled = false;
        document.getElementById('rec-status').textContent = 'הקלטה הושלמה ✓ - לחץ נגן לשמיעה';
      };
      reader.readAsDataURL(recordedBlob);
      document.getElementById('btn-record').textContent = '🎙️ הקלט שוב';
      document.getElementById('btn-record').classList.remove('recording');
      isRecording = false;
    };
    mediaRecorder.start();
    isRecording = true;
    document.getElementById('btn-record').textContent = '⏹ עצור';
    document.getElementById('btn-record').classList.add('recording');
    document.getElementById('rec-status').textContent = '● מקליט...';
  } catch(err) {
    document.getElementById('rec-status').textContent = 'שגיאה: ' + err.message;
  }
}

function stopRecordingIfActive() {
  if (mediaRecorder && isRecording) { mediaRecorder.stop(); }
}

function playRecording() {
  const data = window._pendingAudioData || (cardsData[editingIndex] && cardsData[editingIndex].audioData);
  if (data) new Audio(data).play();
}

function saveCard() {
  if (editingIndex < 0) return;
  const c = cardsData[editingIndex];
  c.label = document.getElementById('modal-label').value || c.label;
  c.phrase = document.getElementById('modal-phrase').value || c.phrase;
  if (tempImageDataUrl) c.imageData = tempImageDataUrl;
  if (window._pendingAudioData) c.audioData = window._pendingAudioData;
  window._pendingAudioData = null;
  localStorage.setItem('cardsData', JSON.stringify(cardsData));
  renderGrid();
  closeModal();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cardsData.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.id = 'card-' + i;
    const mediaHtml = c.imageData
      ? '<img src="' + c.imageData + '" class="card-media">'
      : '<span class="emoji">' + c.emoji + '</span>';
    const audioIcon = c.audioData ? '<span class="has-audio">🎙️</span>' : '';
    div.innerHTML =
      '<button class="edit-btn" onclick="event.stopPropagation();openEdit(' + i + ')">✏️</button>' +
      mediaHtml + audioIcon +
      '<span class="label">' + c.label + '</span>';
    div.onclick = () => {
      if (editMode) { openEdit(i); return; }
      stopCurrentAudio();
      const card = document.getElementById('card-' + i);
      document.querySelectorAll('.card.playing').forEach(c => c.classList.remove('playing'));
      card.classList.add('playing');
      selected.push(i);
      renderOutput();
      scheduleAutoClear();
      if (navigator.vibrate) navigator.vibrate(30);
      setTimeout(() => {
        playCardAudio(i).then(() => card.classList.remove('playing'));
      }, 1500);
    };
    grid.appendChild(div);
  });
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('touchmove', e => { if (e.scale !== 1) e.preventDefault(); }, { passive: false });

speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();
renderGrid();
</script>
</body>
</html>
